name: CI Pipeline

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    # Java Build
    - name: Build Java
      run: |
        cd java-service
        mvn clean test

    # Install C++ tools
    - name: Install tools
      run: |
        sudo apt-get install -y lcov gcovr

    # Build C++
    - name: Build C++
      run: |
        cd cpp-service
        make test
        make coverage

    # Sonar Scan
    - name: SonarCloud Scan
      uses: SonarSource/sonarcloud-github-action@v2
      with:
        args: >
          -Dsonar.login=${{ secrets.SONAR_TOKEN }}

    # Wait for Quality Gate
    - name: Check Sonar Quality Gate
      run: bash scripts/sonar-check.sh

    # Custom Risk Logic
    - name: Risk Check
      run: bash scripts/risk-check.sh