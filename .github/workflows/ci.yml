name: CI Pipeline

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    # Java
    - name: Build Java
      run: |
        cd java-service
        mvn clean test

    # C++
    - name: Install tools
      run: |
        sudo apt-get update
        sudo apt-get install -y gcovr build-essential

    - name: Build C++
      run: |
        cd cpp-service
        make clean
        make test
        make coverage

    # SonarCloud Scan
    - name: Sonar Scan
      uses: SonarSource/sonarcloud-github-action@v2
      with:
        args: >
          -Dsonar.login=${{ secrets.SONAR_TOKEN }}

    # Quality Gate Check
    - name: Sonar Check
      run: bash scripts/sonar-check.sh

    # Custom Logic
    - name: Risk Check
      run: bash scripts/risk-check.sh