sonar.projectKey=your_project_key
sonar.organization=your_org

sonar.sources=java-service/src,cpp-service/src
sonar.tests=java-service/src/test,cpp-service/tests

# Java coverage
sonar.java.coveragePlugin=jacoco
sonar.coverage.jacoco.xmlReportPaths=java-service/target/site/jacoco/jacoco.xml

# C/C++ coverage
sonar.cfamily.gcov.reportsPath=cpp-service

sonar.host.url=https://sonarcloud.io